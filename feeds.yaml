# 수집 소스 정의 — context.md의 스택(AWS/EKS, GitHub Actions, Python/FastAPI, LLM 보안)에 맞춤
# URL은 2026-07-09 기준 HTTP 200 확인됨

rss:
  - name: "Wiz Blog"
    url: "https://www.wiz.io/feed/rss.xml"
  - name: "AWS Security Blog"
    url: "https://aws.amazon.com/blogs/security/feed/"
  - name: "Kubernetes Blog"
    url: "https://kubernetes.io/feed.xml"
  - name: "Sysdig Blog"
    url: "https://sysdig.com/feed/"
  - name: "The Hacker News"
    url: "https://feeds.feedburner.com/TheHackersNews"
  - name: "Simon Willison"
    url: "https://simonwillison.net/atom/everything/"
  - name: "GitHub Security Blog"
    url: "https://github.blog/security/feed/"
  - name: "CNCF Blog"
    url: "https://www.cncf.io/feed/"

reddit:
  - subreddit: "netsec"
    listing: "top"
    t: "day"
    min_score: 30
  - subreddit: "devops"
    listing: "top"
    t: "day"
    min_score: 30
  - subreddit: "kubernetes"
    listing: "top"
    t: "day"
    min_score: 30

hackernews:
  # hnrss.org 사용: https://hnrss.org/newest?q=QUERY&points=N
  - query: "security"
    min_points: 100
  - query: "kubernetes"
    min_points: 80
  - query: "llm"
    min_points: 100

# 주의: created:>N일 조건이라 임계값이 높으면 0건이 됨 (검증: >100/7일=0건, >50/14일=수 건)
github_search:
  - query: "topic:security stars:>50"
    days_back: 14
  - query: "topic:llm stars:>50"
    days_back: 7
